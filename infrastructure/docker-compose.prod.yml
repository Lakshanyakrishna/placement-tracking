version: "3.9"

name: placement-tracker-prod

services:
  app:
    build:
      context: ..
      dockerfile: infrastructure/docker/app/Dockerfile
      target: production
    container_name: pt-app-prod
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - ../.env
    volumes:
      - ../templates/email:/app/templates/email
    depends_on:
      db:
        condition: service_healthy
    restart: always
    user: node
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - placement-tracker-prod-net

  db:
    image: postgres:16-alpine
    container_name: pt-db-prod
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-placement_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    networks:
      - placement-tracker-prod-net

volumes:
  pgdata-prod:
    driver: local

networks:
  placement-tracker-prod-net:
    driver: bridge
